<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="debug"></div>
    <script>
        const pass = "testpass";
        const ivB64 = "6RJYRGF7ddhWWTO5TrgMWA==";
        const ctB64 = "0JZtya+EmbPjutLqzi6jIQ==";

        function log(msg) {
            const el = document.getElementById('debug');
            el.innerHTML += msg + "<br>";
        }

        try {
            const key = CryptoJS.SHA256(pass);
            log("Key (Hex): " + key.toString());
            
            const iv = CryptoJS.enc.Base64.parse(ivB64);
            log("IV (Hex): " + iv.toString());

            const ct = CryptoJS.enc.Base64.parse(ctB64);
            log("CT (Hex): " + ct.toString());

            const decrypted = CryptoJS.AES.decrypt(
                { ciphertext: ct },
                key,
                {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                }
            );

            log("Decrypted Raw: " + decrypted.toString());
            log("Decrypted UTF8: '" + decrypted.toString(CryptoJS.enc.Utf8) + "'");
        } catch (e) {
            log("Error: " + e.stack);
        }
    </script>
</body>
</html>
