<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="result"></div>
    <script>
        const pass = "testpass";
        const ivBase64 = "6RJYRGF7ddhWWTO5TrgMWA==";
        const ctBase64 = "0JZtya+EmbPjutLqzi6jIQ==";

        try {
            const key = CryptoJS.SHA256(pass);
            const iv = CryptoJS.enc.Base64.parse(ivBase64);
            const ciphertext = CryptoJS.enc.Base64.parse(ctBase64);

            const decrypted = CryptoJS.AES.decrypt(
                { ciphertext: ciphertext },
                key,
                {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                }
            );

            const out = decrypted.toString(CryptoJS.enc.Utf8);
            document.getElementById('result').innerText = "Decrypted: '" + out + "'";
        } catch (e) {
            document.getElementById('result').innerText = "Error: " + e.message;
        }
    </script>
</body>
</html>
